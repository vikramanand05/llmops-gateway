apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: llmops-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: public.ecr.aws/example/llmops-gateway-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: llmops-gateway
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
